interface:
  display_name: "微信内容路由（Windows）"
  short_description: "把微信里转来的小红书/公众号链接自动识别并落到 Obsidian 或本地文件夹（Windows 版）"
  default_prompt: "如果这是首次安装或尚未完成本地配置，不要在聊天里代替用户填写路径，不要要求用户自己配置微信数据库路径，也不要再询问 OCR。应自动切到本地辅助配置流程：先让用户选择“本地 / Obsidian”，OCR 默认开启，Obsidian 路径优先自动探测、失败再用目录选择器兜底；微信自动来源默认走内置 WCDB 解密并导入，只有实验模式才走直接扫描微信进程。只有本地配置完成后，再进入日常使用。"
