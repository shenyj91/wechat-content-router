interface:
  display_name: "微信内容路由（Windows）"
  short_description: "把微信里转来的小红书/公众号链接自动识别并落到 Obsidian 或本地文件夹（Windows 版）"
  default_prompt: "如果这是首次安装或尚未完成本地配置，不要在聊天里代替用户填写路径。先明确提示用户：请在 Windows 本地双击 START-HERE.bat（或运行 python scripts/use_router.py）进入真实配置向导；真实向导会在本机弹出目录选择器，并在后台自动处理微信定位与解密。只有在用户已经完成本地配置之后，再进入日常使用。"
