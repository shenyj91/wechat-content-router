<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信只读查看器</title>
<style>
  :root {
    --surface: #f5f5f5;
    --surface-alt: #ffffff;
    --border: #e3e3e3;
    --text: #1a1a1a;
    --text-muted: #8a8a8a;
    --text-faint: #b0b0b0;
    --accent: #07c160;
    --accent-light: #e8f8ee;
    --warning: #ff9f0a;
    --warning-bg: #fff6e6;
    --error: #e54d42;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 320px; flex-shrink: 0;
    background: var(--surface-alt);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .brand h2 { font-size: 15px; font-weight: 700; }
  .readonly-badge {
    font-size: 10px; font-weight: 600; color: var(--accent);
    background: var(--accent-light); padding: 2px 6px; border-radius: 4px;
  }
  .input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; outline: none; background: #fafafa;
  }
  .input:focus { border-color: var(--accent); background: #fff; }
  .session-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .session-tab {
    flex: 1; text-align: center; padding: 9px 0; font-size: 12px; font-weight: 600;
    color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .session-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .session-list { flex: 1; overflow-y: auto; }
  .session-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    cursor: pointer; border-bottom: 1px solid #f0f0f0;
  }
  .session-item:hover { background: var(--accent-light); }
  .session-item.active { background: #e0f5e9; }
  .session-avatar {
    width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0;
    background: var(--accent-light); color: var(--accent);
    display: grid; place-items: center; font-size: 15px; font-weight: 700;
  }
  .session-info { flex: 1; min-width: 0; }
  .session-name {
    font-size: 13px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .session-time { font-size: 11px; color: var(--text-faint); margin-top: 3px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main-header {
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--surface-alt);
  }
  .main-header h3 { font-size: 15px; font-weight: 700; }
  .session-count { font-size: 11px; color: var(--text-faint); }
  .btn {
    padding: 7px 14px; border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #06ad56; }
  .btn-ghost { background: #f0f0f0; color: var(--text); }
  .btn-ghost:hover { background: #e6e6e6; }
  .messages { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; gap: 8px; max-width: 76%; }
  .msg.sent { align-self: flex-end; flex-direction: row-reverse; }
  .msg.received { align-self: flex-start; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    background: var(--accent-light); color: var(--accent);
    display: grid; place-items: center; font-size: 11px; font-weight: 700;
  }
  .msg-bubble {
    padding: 9px 13px; border-radius: 12px; font-size: 13.5px; line-height: 1.55;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.sent .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.received .msg-bubble { background: var(--surface-alt); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-meta { font-size: 10px; color: var(--text-faint); margin-top: 4px; text-align: right; }
  .msg.received .msg-meta { text-align: left; }
  .search-results-header {
    padding: 8px 20px; background: var(--warning-bg); font-size: 12px;
    color: var(--warning); display: none; align-items: center; gap: 8px;
  }
  .search-results-header.visible { display: flex; }
  .empty-main { flex: 1; display: flex; flex-direction: column; gap: 6px; justify-content: center; align-items: center; color: var(--text-faint); font-size: 14px; }
  .loading { padding: 24px; text-align: center; color: var(--text-faint); }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Key panel */
  .key-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .key-overlay.visible { display: flex; }
  .key-card {
    background: #fff; border-radius: 14px; padding: 26px; width: 440px; max-width: 90vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .key-card h3 { font-size: 16px; margin-bottom: 6px; }
  .key-card p { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }
  .key-card textarea {
    width: 100%; height: 70px; padding: 10px; border: 1px solid var(--border);
    border-radius: 8px; font-family: monospace; font-size: 12px; resize: none; outline: none;
  }
  .key-card textarea:focus { border-color: var(--accent); }
  .key-actions { display: flex; gap: 10px; margin-top: 14px; }
  .key-actions .btn { flex: 1; }
  .key-err { color: var(--error); font-size: 12.5px; margin: 10px 0; line-height: 1.6; white-space: pre-wrap; }
  .key-hint { font-size: 11px; color: var(--text-faint); margin-top: 12px; line-height: 1.5; }
  .key-adv { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .key-adv summary { cursor: pointer; font-size: 12.5px; color: var(--text-muted); font-weight: 600; user-select: none; }
  .key-adv textarea { margin-top: 10px; }
  .key-card p code, .key-hint code, .key-adv p code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <h2>微信只读查看器</h2>
        <span class="readonly-badge">只读</span>
      </div>
      <input class="input" id="searchInput" placeholder="搜索消息内容…">
    </div>
    <div class="session-tabs">
      <div class="session-tab active" data-kind="all">全部</div>
      <div class="session-tab" data-kind="private">私聊</div>
      <div class="session-tab" data-kind="group">群聊</div>
    </div>
    <div class="session-list" id="sessionList">
      <div class="loading"><span class="spinner"></span> 加载中…</div>
    </div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader" style="display:none">
      <h3 id="headerName"></h3>
      <span class="session-count" id="headerCount"></span>
    </div>
    <div class="search-results-header" id="searchResultsHeader">
      <span class="spinner"></span>
      <span id="searchResultsText"></span>
      <button class="btn btn-ghost" id="btnClearSearch" style="margin-left:auto;padding:4px 10px">清除</button>
    </div>
    <div class="messages" id="messagesArea">
      <div class="empty-main">选择一个会话查看聊天记录</div>
    </div>
  </div>
</div>

<div class="key-overlay" id="keyOverlay">
  <div class="key-card">
    <h3>需要连接微信数据库</h3>
    <p>本查看器只读取、不修改任何微信数据。密钥由本地 <code>wx_key.dll</code> <b>自动</b>从正在运行的微信中提取，<b>你无需手动输入任何密钥</b>。</p>
    <div class="key-err" id="keyErr"></div>
    <div class="key-actions">
      <button class="btn btn-primary" id="btnAutoExtract">自动提取密钥 / 重试</button>
    </div>
    <details class="key-adv">
      <summary>高级：手动粘贴密钥（仅开发者调试）</summary>
      <p class="key-hint">普通用户不需要此步骤。64 位十六进制密钥由密钥提取工具产出，自动保存在本地 <code>.viewer_key.json</code>，不会上传。</p>
      <textarea id="keyInput" placeholder="例如：a1b2c3...（64 位十六进制）"></textarea>
      <div class="key-actions">
        <button class="btn btn-primary" id="btnConnect">连接</button>
      </div>
      <div class="key-err" id="keyErrManual"></div>
    </details>
    <div class="key-hint">前提：微信已启动并登录；且已执行 <code>npm install</code>（安装 koffi）。自动提取失败请查看终端日志。</div>
  </div>
</div>

<script>
const API = ''
let sessions = []
let currentSession = null
let currentKind = 'all'
let searchMode = false

const $ = (id) => document.getElementById(id)
const searchInput = $('searchInput')
const sessionList = $('sessionList')
const sessionTabs = document.querySelectorAll('.session-tab')
const mainHeader = $('mainHeader')
const headerName = $('headerName')
const headerCount = $('headerCount')
const messagesArea = $('messagesArea')
const searchResultsHeader = $('searchResultsHeader')
const searchResultsText = $('searchResultsText')
const keyOverlay = $('keyOverlay')

async function api(path, opts = {}) {
  const resp = await fetch(API + path, opts)
  if (!resp.ok) { const b = await resp.json().catch(() => ({error:`HTTP ${resp.status}`})); throw new Error(b.error || `请求失败 (${resp.status})`) }
  return resp.json()
}

function escapeHtml(s) {
  if (!s) return ''
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

// ── 初始化 ──
async function init() {
  showLoading('正在准备…')
  try {
    const st = await api('/api/status')
    if (st.ok && st.data.connected) {
      loadSessions('all')
      return
    }
    // 未连接 → 自动提取（端用户唯一可行路径，无需手动粘贴任何密钥）
    await autoExtractOnLoad()
  } catch (e) {
    showKeyPanel(`服务未响应：${e.message}`, true)
  }
}

function showLoading(text) {
  keyOverlay.classList.remove('visible')
  sessionList.innerHTML = `<div class="loading"><span class="spinner"></span> ${escapeHtml(text)}</div>`
}

function showKeyPanel(errorMsg, canRetry) {
  keyOverlay.classList.add('visible')
  const errEl = $('keyErr')
  if (errorMsg) {
    errEl.textContent = errorMsg
    errEl.style.display = 'block'
  } else {
    errEl.textContent = ''
    errEl.style.display = 'none'
  }
  $('btnAutoExtract').style.display = canRetry ? '' : 'none'
  $('keyInput').value = ''
  $('keyErrManual').textContent = ''
}

async function autoExtractOnLoad() {
  showLoading('正在自动提取微信密钥（需微信已运行且登录）…')
  try {
    const r = await api('/api/auto-extract', { method: 'POST' })
    if (r.ok) {
      loadSessions('all')
      return
    }
    showKeyPanel(r.error, true)
  } catch (e) {
    showKeyPanel(`网络请求失败：${e.message}（请查看终端日志）`, true)
  }
}

// ── 会话列表 ──
async function loadSessions(kind) {
  currentKind = kind || 'all'
  sessionList.innerHTML = '<div class="loading"><span class="spinner"></span> 加载中…</div>'
  try {
    const r = await api(`/api/sessions?kind=${currentKind}&limit=200`)
    if (!r.ok) throw new Error(r.error)
    sessions = r.data || []
    renderSessionList(sessions)
  } catch (e) {
    sessionList.innerHTML = `<div class="loading" style="color:var(--error)">${escapeHtml(e.message)}</div>`
  }
}

function renderSessionList(list) {
  sessionList.innerHTML = ''
  if (list.length === 0) { sessionList.innerHTML = '<div class="loading">无会话</div>'; return }
  for (const s of list) {
    const item = document.createElement('div')
    item.className = 'session-item' + (currentSession && currentSession.username === s.username ? ' active' : '')
    const initial = (s.displayName || s.username || '?')[0].toUpperCase()
    item.innerHTML = `
      <div class="session-avatar">${escapeHtml(initial)}</div>
      <div class="session-info">
        <div class="session-name">${escapeHtml(s.displayName || s.username)}</div>
        <div class="session-time">${escapeHtml(s.lastTime || '')}</div>
      </div>`
    item.addEventListener('click', () => selectSession(s))
    sessionList.appendChild(item)
  }
}

// ── 选择会话 ──
async function selectSession(session) {
  currentSession = session
  searchMode = false
  searchResultsHeader.classList.remove('visible')
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'))
  const items = [...sessionList.querySelectorAll('.session-item')]
  const idx = sessions.indexOf(session)
  if (idx >= 0 && items[idx]) items[idx].classList.add('active')
  mainHeader.style.display = ''
  headerName.textContent = session.displayName || session.username
  headerCount.textContent = ''
  messagesArea.innerHTML = '<div class="empty-main"><span class="spinner"></span> 加载中…</div>'
  try {
    const r = await api(`/api/messages?session_id=${encodeURIComponent(session.username)}&limit=50`)
    if (!r.ok) throw new Error(r.error)
    const msgs = r.data || []
    headerCount.textContent = `${msgs.length} 条`
    renderMessages(msgs)
  } catch (e) {
    messagesArea.innerHTML = `<div class="empty-main" style="color:var(--error)">${escapeHtml(e.message)}</div>`
  }
}

function renderMessages(msgs) {
  messagesArea.innerHTML = ''
  if (msgs.length === 0) { messagesArea.innerHTML = '<div class="empty-main">暂无消息</div>'; return }
  for (const m of msgs) {
    const sent = m.isSelf
    const el = document.createElement('div')
    el.className = 'msg ' + (sent ? 'sent' : 'received')
    const initial = (m.senderName || m.sender || '?')[0].toUpperCase()
    const content = formatContent(m.content, m.type)
    el.innerHTML = `
      ${!sent ? `<div class="msg-avatar">${escapeHtml(initial)}</div>` : ''}
      <div>
        ${m.sessionType === 'group' && !sent ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${escapeHtml(m.senderName || m.sender || '')}</div>` : ''}
        <div class="msg-bubble">${content}</div>
        <div class="msg-meta">${escapeHtml(m.time || '')}</div>
      </div>`
    messagesArea.appendChild(el)
  }
  messagesArea.scrollTop = messagesArea.scrollHeight
}

function formatContent(content, type) {
  if (!content) return '<span style="color:var(--text-faint)">[空消息]</span>'
  switch (type) {
    case 3: return '📷 [图片]'
    case 34: return '🎤 [语音]'
    case 42: return '👤 [名片]'
    case 43: return '🎬 [视频]'
    case 47: return '😀 [表情]'
    case 48: return '📍 [位置]'
    case 49: return '🔗 [链接/文件]'
    case 50: return '📞 [通话]'
    case 10000:
    case 10002: return `<em style="color:var(--text-faint)">${escapeHtml(content)}</em>`
    default: return escapeHtml(content)
  }
}

// ── 搜索 ──
let searchTimer = null
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => doSearch(searchInput.value.trim()), 300)
})

async function doSearch(keyword) {
  if (!keyword) {
    searchMode = false
    searchResultsHeader.classList.remove('visible')
    renderSessionList(sessions)
    return
  }
  searchMode = true
  searchResultsHeader.classList.add('visible')
  searchResultsText.textContent = '搜索中…'
  try {
    const sp = currentSession ? `&session_id=${encodeURIComponent(currentSession.username)}` : ''
    const r = await api(`/api/search?keyword=${encodeURIComponent(keyword)}${sp}&limit=30`)
    if (!r.ok) throw new Error(r.error)
    const msgs = r.data || []
    searchResultsText.textContent = `找到 ${msgs.length} 条结果`
    if (msgs.length === 0) {
      messagesArea.innerHTML = '<div class="empty-main">未找到匹配的消息</div>'
    } else {
      mainHeader.style.display = ''
      headerName.textContent = `搜索：“${keyword}”`
      headerCount.textContent = `${msgs.length} 条结果`
      renderSearchResults(msgs, keyword)
    }
  } catch (e) {
    searchResultsText.textContent = '搜索失败：' + e.message
  }
}

function renderSearchResults(msgs, keyword) {
  messagesArea.innerHTML = ''
  for (const m of msgs) {
    const el = document.createElement('div')
    el.className = 'msg received'
    const initial = (m.senderName || m.sender || '?')[0].toUpperCase()
    el.innerHTML = `
      <div class="msg-avatar">${escapeHtml(initial)}</div>
      <div>
        <div class="msg-bubble">${highlight(escapeHtml(m.content || ''), keyword)}</div>
        <div class="msg-meta">${escapeHtml(m.sessionId || '')} · ${escapeHtml(m.time || '')}</div>
      </div>`
    el.style.cursor = 'pointer'
    el.addEventListener('click', () => {
      const s = sessions.find(x => x.username === m.sessionId)
      if (s) selectSession(s)
    })
    messagesArea.appendChild(el)
  }
  messagesArea.scrollTop = messagesArea.scrollHeight
}

function highlight(html, kw) {
  if (!kw) return html
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')
  return html.replace(re, '<strong style="color:var(--warning)">$&</strong>')
}

$('btnClearSearch').addEventListener('click', () => { searchInput.value = ''; doSearch('') })

sessionTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    sessionTabs.forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    loadSessions(tab.dataset.kind)
  })
})

// ── 密钥面板 ──
$('btnConnect').addEventListener('click', async () => {
  const key = $('keyInput').value.trim()
  $('keyErrManual').textContent = ''
  if (!/^[0-9a-fA-F]{64}$/.test(key)) {
    $('keyErrManual').textContent = '密钥格式不正确，应为 64 位十六进制字符。'
    return
  }
  try {
    const r = await api('/api/set-key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) })
    if (!r.ok) throw new Error(r.error)
    keyOverlay.classList.remove('visible')
    loadSessions('all')
  } catch (e) {
    $('keyErrManual').textContent = e.message
  }
})

$('btnAutoExtract').addEventListener('click', () => {
  autoExtractOnLoad()
})

init()
</script>
</body>
</html>
